<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block vs Inline Elements</title>
</head>
<body>
    <div>
        <p style="color: red;">This paragraph is inside a block-level div and is red.</p>
    </div>

    <p>This sentence has a <span style="color: blue;">blue</span> word using a span element.</p>
</body>
</html>
